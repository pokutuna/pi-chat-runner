display_information:
  name: pi-chat-runner
  description: pi-chat-runner
features:
  bot_user:
    display_name: pi-chat-runner
    always_online: true
  # DM (im) を受けるための入力欄。これが無いと App の Messages タブが
  # read-only になり、ユーザーが bot に DM を送れない (DM 自体の受信は
  # im:history + message.im 側)。DM の起動既定は passthrough (docs/design/config.md §2)
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
    - app_mentions:read
    - chat:write
    - reactions:write
    - channels:history
    - groups:history
    - im:history
settings:
  event_subscriptions:
    bot_events:
    - app_mention
    - message.channels
    - message.groups
    - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
