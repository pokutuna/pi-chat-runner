# One array of channel configs. "default" is required as the fallback base;
# every other entry replaces default's fields wholesale (no deep-merge).
channels:
  - channel: "default"
    # Fallback for any channel below with no matching entry. Doesn't apply to
    # DMs (see the "dm" entry). Keep this mention-only — passthrough here
    # would react to every message in every channel the bot is in.
    model: gemini-3.5-flash
    systemPrompt: ./prompts/ask-ai.md
    trigger:
      when:
        - kind: mention

  - channel: "dm"
    # Fallback for DMs. Without this entry, DMs default to passthrough (every
    # DM triggers a session); `when: []` disables them entirely (also works
    # on "default").
    trigger:
      when: []

  - channel: "C0000000001" # REPLACE: your channel ID
    # General-purpose assistant, mention-triggered.
    systemPrompt: ./prompts/ask-ai.md
    trigger:
      when:
        - kind: mention

  - channel: "C0000000003" # REPLACE: your channel ID
    # Classifier demo: judges every message, no mention needed. Only
    # cooking-related messages trigger a session.
    systemPrompt: ./prompts/ask-ai.md
    trigger:
      when:
        - kind: classifier
          criteria: "Is this about cooking — recipes, ingredients, or techniques? Exclude messages only about eating out or restaurants."

  - channel: "C0000000002" # REPLACE: your channel ID
    # Keyword-or-mention demo: triggers on "help"/"エラー", or any bot mention.
    trigger:
      when:
        - kind: keyword
          pattern: "([Hh]elp|エラー)"
        - kind: mention
    # Optional tool limits — reply is always allowed. UNCOMMENT to enable:
    # tools: [read, grep, bash] # investigation-only allowlist
    # excludeTools: [write, edit] # or just drop the write-capable tools

  - channel: "C0000000004" # REPLACE: your channel ID
    # Reaction-or-mention demo: reacting :eyes:/:robot_face: on an existing
    # message starts a session on that message (resumes its thread if it's a
    # thread reply).
    systemPrompt: ./prompts/ask-ai.md
    trigger:
      when:
        - kind: reaction
          emoji: [eyes, robot_face] # Slack's normalized names, no leading ":"
        - kind: mention
