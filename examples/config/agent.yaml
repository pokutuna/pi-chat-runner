# agent.yaml — bridge 本体の挙動既定 (docs/design/config.md §6)。
#
# channels/*.yaml (チャンネルごとの振る舞い差分) とは別の設定ファイル。ここは
# チャンネル横断の bridge プロセスの挙動既定で、boot 時に 1 回だけ読まれる。
# 優先順位は env > agent.yaml > コード既定 (env はローカルで一時的に上書きする
# ための override)。ここではすべてコメントアウトしてあり、コメントだけの
# ファイルなのでローカル既定動作は変わらない。

# pi:
#   # pi の --provider。省略時はコード既定 (pi 本体の既定 provider)
#   provider: google-vertex
#
#   # ChannelDoc.model が省略されたときに使うモデル。省略時はコード既定
#   model: gemini-3.5-flash
#
#   # 1 ターンの上限 (ms)。超過で pi を kill する (docs/design/session-runtime.md §6)。
#   # 省略時は SessionRunner の既定 (600000 = 10 分)
#   turnTimeoutMs: 600000
#
#   # pi へ継承する env 名の追加 allowlist (docs/design/session-runtime.md §2)。
#   # 値そのものはここに書かない (secret は Secret Manager -> --set-secrets で
#   # 値を渡し、ここには名前だけ列挙する)。SLACK_ / BRIDGE_ prefix の名前は
#   # bridge 予約のため拒否される (誤設定で bot token が pi に漏れる事故防止)
#   envPassthrough:
#     - GH_TOKEN
