apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pi-chat-runner
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      timeoutSeconds: 3600
      containerConcurrency: 10
      containers:
        - image: gcr.io/PROJECT_ID/pi-chat-runner:latest # REPLACE: your built & pushed image
          ports:
            - name: http1
              containerPort: 8080
          # These env vars feed agent.yaml's ${env.X} / ${env.X:-default} references.
          # Deploy-specific values (backend choice, UID separation, GCP project) live
          # here so the same agent.yaml works locally and in production.
          env:
            - name: SLACK_MODE
              value: events # production uses events (HTTP push), not socket
            - name: STORE_BACKEND
              value: firestore # production needs a durable backend
            - name: WORKDIR_ARCHIVE_DIR
              value: /data/channels # read directly by the bridge, not via agent.yaml; sub-dir keeps /data shared with SHARED_DIR
            - name: SHARED_DIR
              value: /data/shared # channel-shared persistent dir (docs/design/shared.md); unset to disable
            - name: PI_PERMISSION_MODE
              value: "1" # "0" disables sandboxing; any other value enables it
            - name: PI_AGENT_UID
              value: "1001" # set together with PI_AGENT_GID, or not at all
            - name: PI_AGENT_GID
              value: "1001"
            - name: METADATA_SERVER_DETECTION
              value: assume-present # forces ADC to use Cloud Run's metadata server
            - name: SLACK_BOT_USER_ID
              value: "U0000000000" # REPLACE: your bot's user ID
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID # REPLACE: your GCP project ID
            # - name: CONFIG_PATH      # optional: defaults to examples/config/agent.yaml, already in the base image
            #   value: examples/config/agent.yaml
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pi-chat-runner-slack-bot-token # REPLACE: your Secret Manager secret name
                  key: latest
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: pi-chat-runner-slack-signing-secret # REPLACE: your Secret Manager secret name
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: PROJECT_ID-pi-chat-runner-data # REPLACE: your GCS bucket name
              mountOptions: "uid=0,gid=0,dir-mode=0700,file-mode=0600"
