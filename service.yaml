# Cloud Run サービス定義 (Knative Service YAML)
#
# 適用: gcloud run services replace service.yaml --region <region> --project <project>
#
# 設計の正: docs/design/architecture.md §1 (単一サービス、min-instances=0、
# CPU always-allocated、timeout 60min) / §4 (GCS FUSE で /data をマウント)、
# docs/design/session-runtime.md §5 (base image)。
#
# 置き換えが必要な箇所には "REPLACE:" コメントを付けている。
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pi-chat-runner
  # REPLACE: 実 GCP プロジェクト
  # annotations:
  #   run.googleapis.com/launch-stage: BETA  # GCS FUSE ボリューム機能に必要な場合がある
spec:
  template:
    metadata:
      annotations:
        # min-instances=0: 低負荷時は 0 台までスケールイン (architecture.md §1)。
        # コールドスタートは avoid のため base image を最小構成にしている (session-runtime.md §5)
        autoscaling.knative.dev/minScale: "0"
        # max-instances は控えめに固定 (Slack ワークスペース 1 組織・非公開運用の前提。
        # 増やす場合は Firestore lease 排他がスケールアウトに耐えることを確認してから)
        autoscaling.knative.dev/maxScale: "3"
        # CPU always-allocated: /slack/events への 200 応答後も CPU を継続して
        # 割り当てる。レスポンス後に inbox drain → pi kick → ターン実行を行う
        # 実行モデル (architecture.md §1 「レスポンス後」) の前提になる
        run.googleapis.com/cpu-throttling: "false"
        # GCS FUSE ボリュームマウントの有効化 (architecture.md §4)
        run.googleapis.com/execution-environment: gen2
    spec:
      # 1 リクエストの処理時間上限。ターンは長時間対話になりうるため 60 分を確保
      # (architecture.md §1 timeout 60min)。linger やターン timeout (Step 6, 未実装時は無制限)
      # よりも十分長く取る
      timeoutSeconds: 3600
      # concurrency は控えめに (1 インスタンスが同時に抱えるスレッド数の上限。
      # 大きくし過ぎると同一インスタンス上の複数 pi 子プロセスが CPU/メモリを取り合う)
      containerConcurrency: 10
      containers:
        # REPLACE: 実際にビルド・push したイメージの参照に置き換える
        - image: gcr.io/PROJECT_ID/pi-chat-runner:latest
          ports:
            # SLACK_MODE=events (HttpEventSource) が listen するポート。
            # server.ts の既定 (env PORT, 既定 8080) と合わせる
            - name: http1
              containerPort: 8080
          env:
            # 入口は Events API 固定 (本番)。Socket Mode はローカル/お試し用
            # (architecture.md §1 「入口を差し替え可能にする」)
            - name: SLACK_MODE
              value: events
            # 永続化バックエンドは Firestore (persistence.md §1)
            - name: STORE_BACKEND
              value: firestore
            # GCS FUSE のマウント先 (下記 volumeMounts と対応)。
            # WorkdirStorage (restore/flush) がこのパス配下にセッションごとの
            # ディレクトリを作る (session-runtime.md §3)
            - name: WORKDIR_ARCHIVE_DIR
              value: /data
            # UID 分離 (session-runtime.md §6)。base image の agent ユーザー
            # (uid/gid 1001) で pi を実行し、Runner の environ / /data を読めなくする
            - name: PI_AGENT_UID
              value: "1001"
            - name: PI_AGENT_GID
              value: "1001"
            # REPLACE: bot の User ID (自己エコー除外・mention 判定に使う)
            - name: SLACK_BOT_USER_ID
              value: "U0000000000"
            # REPLACE: 実 GCP プロジェクト ID (Firestore/ADC が使用)
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            # 任意: ChannelDoc.model 未指定時の既定モデル / provider
            # - name: PI_MODEL
            #   value: gemini-3-pro
            # - name: PI_PROVIDER
            #   value: google-vertex
            # 任意: CONFIG_DIR (既定 examples/config。base image に同梱済み)
            # - name: CONFIG_DIR
            #   value: examples/config
            # Secret Manager 参照 (値は YAML に書かない。config.md §5)
            # REPLACE: Secret Manager 上のシークレット名
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pi-chat-runner-slack-bot-token # REPLACE
                  key: latest
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: pi-chat-runner-slack-signing-secret # REPLACE
                  key: latest
          resources:
            limits:
              # pi 子プロセス + Runner の同時実行分を見込んだ最小構成。
              # concurrency=10 で足りなければ増やす (肥大化に凝らない初期値)
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        # GCS FUSE ボリューム (architecture.md §4)。transcript / workspace /
        # artifacts / docs の保存棚。pi 子プロセスは tmpfs (workdir) で走り、
        # ターン境界でのみここへ flush する (書き込み増幅を避ける設計)
        - name: data
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              # REPLACE: 実バケット名
              bucketName: PROJECT_ID-pi-chat-runner-data
              # 隔離の要点 (session-runtime.md §6): pi (uid 1001) からは /data を
              # traverse 不可にする。uid=runner (root/0) は Runner プロセスの実行 uid。
              # 初期版で uid 分離 (Step 6) を入れるまでは実効的な制約にならないが、
              # マウント設定としては先に倒しておく
              mountOptions: "uid=0,gid=0,dir-mode=0700,file-mode=0600"
